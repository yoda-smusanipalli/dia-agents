apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: backend-config
spec:
  # Increase timeout for SSE/streaming connections (GitHub scans can take several minutes)
  timeoutSec: 600  # 10 minutes
  connectionDraining:
    drainingTimeoutSec: 60
  # Enable Cloud CDN with proper cache settings for SSE
  cdn:
    enabled: false  # Disable CDN for SSE endpoints
  # Custom request headers
  customRequestHeaders:
    headers:
    - "X-Client-Region:{client_region}"
    - "X-Client-City:{client_city}"
