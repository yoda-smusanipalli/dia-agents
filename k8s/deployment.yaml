apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dia-sqlite-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-login-console
spec:
  replicas: 1 # SQLite requires 1 replica to avoid DB locking
  strategy:
    type: Recreate # Ensure old pod releases PVC before new one starts
  selector:
    matchLabels:
      app: cloud-login-console
  template:
    metadata:
      labels:
        app: cloud-login-console
    spec:
      containers:
      - name: dia-app
        image: gcr.io/dia-sathya/dia-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: dia-secrets
              key: ANTHROPIC_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/data
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: dia-sqlite-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-login-console-service
  annotations:
    cloud.google.com/backend-config: '{"default": "backend-config"}'
spec:
  type: NodePort
  selector:
    app: cloud-login-console
  ports:
  - port: 80
    targetPort: 3000
